<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Celine's Persona</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <script src="persona.js"></script>
</head>

<body>
  <!-- Homepage -->
  <header id="home">
    <div id="bg-video">
      <video autoplay muted playsinline id="bg-video1">
        <source src="p3intro.mp4" type="video/mp4">
      </video>
      <video autoplay muted loop playsinline id="bg-video2">
        <source src="fv_menu_movie.mp4" type="video/mp4">
      </video>
    </div>

    <div class="home-content">
      <h1 id="home-title">Celine's <span style="color: #4D4D4D;">Persona</span></h1>
    </div>
  </header>

  <main>
    <!-- About me -->
    <div id="about">
      <button class="menu-button" id="about-me-button"> <span class="btn-slash-red"></span>
        <span class="btn-slash-white"></span>
        <span class="btn-label-sel">About Me</span>
        <span class="btn-label">About Me</span></button>

      <!-- Resume -->
      <div id="resume">
        <button class="menu-button" id="resume-button"> <span class="btn-slash-red"></span>
          <span class="btn-slash-white"></span>
          <span class="btn-label-sel">Resume</span>
          <span class="btn-label">Resume</span></button>
      </div>

      <!-- Portfolio -->
      <div id="portfolio">
        <button class="menu-button" id="portfolio-button">
          <span class="btn-slash-red"></span>
          <span class="btn-slash-white"></span>
          <span class="btn-label-sel">Portfolio</span>
          <span class="btn-label">Portfolio</span>
        </button>

        <button class="menu-button" id="contact-button"> <span class="btn-slash-red"></span>
          <span class="btn-slash-white"></span>
          <span class="btn-label-sel">Contact</span>
          <span class="btn-label">Contact</span></button>
  </main>
</body>

</html>
