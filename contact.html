<body>
<header>

 <!-- Contact -->
 <footer id="contact">

    </footer>

  <address>
    <div class="contact-info">
    <p class="socials">Email: <a href="mailto:celineelbanna74@gmail.com">celineelbanna74@gmail.com</a></p>

    <form action="#" method="post">
      <label for="name">Name</label>

      <input type="email" id="email" name="email" placeholder="Email" required />
