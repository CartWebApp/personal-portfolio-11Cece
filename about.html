<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Celine's Persona</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <script src="persona.js"></script>
</head>

<body>
  <header>
    <div id="bg-video">
      <video autoplay muted loop playsinline id="bg-video3">
        <source src="main1.mp4" type="video/mp4">
      </video>
    </div>

    <div id="party-select">
      <a href="myself.html">
        <div class="party-option" tabindex="0" id="about-me-party">
          <span class="party-slash-red"></span>
          <span class="party-slash-white"></span>
          <span class="party-label">Leader</span>
          <span class="Me">About Me</span>
          <img src="char1.png" alt="Leader Icon" class="party-icon">
        </div>
      </a>
      <a href="CART.html">
        <div class="party-option" tabindex="0" id="resume-party">
          <span class="party-slash-red"></span>
          <span class="party-slash-white"></span>
          <span class="party-label">Party</span>
          <span class="CART-Reflection">CART Reflection</span>
          <img src="char3.png" alt="Party Icon" class="party-icon">
        </div>
      </a>
      <a href="Hobbies.html">
        <div class="party-option" tabindex="0" id="portfolio-party">
          <span class="party-slash-red"></span>
          <span class="party-slash-white"></span>
          <span class="party-label">Party</span>
          <span class="hobbies">Hobbies</span>
          <img src="char2.png" alt="Party Icon" class="party-icon">
        </div>
      </a>
    </div>

    <div id="portfolio-ui">
      <div class="nav-bar">
        <div class="back-wrap">
          <a id="back-btn" href="index.html">
            <span class="back-label">◄ BACK</span>
          </a>
        </div>
      </div>
    </div>
  </header>
</body>

</html>
